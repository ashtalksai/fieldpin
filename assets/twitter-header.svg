<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <pattern id="topo1" x="0" y="0" width="100" height="100" patternTransform="rotate(-20)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="50" x2="100" y2="50" stroke="#2D6A4F" stroke-width="1.5" opacity="0.2"/>
    </pattern>
    <pattern id="topo2" x="0" y="0" width="160" height="160" patternTransform="rotate(-50)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="80" x2="160" y2="80" stroke="#52B788" stroke-width="1" opacity="0.07"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1C1A14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1C1A14" stop-opacity="0.65"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1C1A14"/>
      <stop offset="20%" stop-color="#2D6A4F"/>
      <stop offset="50%" stop-color="#52B788"/>
      <stop offset="80%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1C1A14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#1C1A14"/>

  <!-- Topo layers -->
  <rect width="1500" height="500" fill="url(#topo1)"/>
  <rect width="1500" height="500" fill="url(#topo2)"/>

  <!-- Vignette -->
  <rect width="1500" height="500" fill="url(#vignette)"/>

  <!-- Centered wordmark -->
  <text x="750" y="285" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="136" fill="#F5F1E8" text-anchor="middle" letter-spacing="-4">Fieldpin</text>

  <!-- Tagline -->
  <text x="750" y="355" font-family="Georgia, serif" font-size="24" fill="rgba(245,241,232,0.5)" text-anchor="middle" letter-spacing="5">FIELD DATA THAT DOESN'T WAIT FOR WI-FI</text>

  <!-- Bottom accent line -->
  <rect x="0" y="497" width="1500" height="3" fill="url(#accentLine)"/>
</svg>
